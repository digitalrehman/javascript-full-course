<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Async</title>
    <style>
      body {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
      }
      .card {
        text-transform: capitalize;
        height: 300px;
        padding-inline: 20px;
        border: 1px solid rgba(128, 128, 128, 0.288);
        border-radius: 10px;
        width: 300px;
        transition: 0.3s;
      }
      .card:hover {
        box-shadow: 10px 10px 20px rgba(128, 128, 128, 0.425);
        transform: translateY(-10px);
      }
    </style>
  </head>
  <body id="card">
  
    <script src="./script.js"></script>
  </body>
</html>
